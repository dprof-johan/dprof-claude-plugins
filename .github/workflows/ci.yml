name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: plugins/dev-chronicler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Validate plugin JSON manifests
        run: npm run validate:json
      - name: Validate marketplace manifest JSON
        working-directory: .
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'));console.log('ok marketplace.json')"
      - name: Run tests
        run: node --test
