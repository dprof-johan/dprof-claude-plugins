name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: plugins/dev-chronicler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Validate plugin JSON manifests
        run: npm run validate:json
      - name: Validate marketplace manifest JSON
        working-directory: .
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'));console.log('ok marketplace.json')"
      - name: Run tests
        run: node --test

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin and marketplace manifests
        run: claude plugin validate .
      - name: Structural eval against the golden chronicle
        run: node evals/dev-chronicler/structural-eval.js
      - name: Structural eval harness self-tests
        run: node --test evals/dev-chronicler/structural.test.js
      - name: LLM-judge harness self-tests (mock backend)
        run: node --test evals/dev-chronicler/judge.test.js
      - name: Eval runner plumbing self-test (dry-run, no model)
        run: node --test evals/dev-chronicler/runner.test.js
